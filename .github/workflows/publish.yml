name: Publish to npm and GitHub

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # OIDC identity token for npm Trusted Publishing (replaces NPM_TOKEN).
      id-token: write
    env:
      # checkout@v5 and setup-node@v5 already declare the Node 24 action
      # runtime. softprops/action-gh-release@v2 still declares Node 20 (no
      # node24 release yet), so keep forcing JS actions onto Node 24 ahead
      # of GitHub's node20 runtime removal (~2026-09-16). Drop this once the
      # release action ships a node24 major.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; the npm bundled
      # with the Node 24 runner may lag that, so pin it up explicitly.
      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Publish to the global npm registry via OIDC Trusted Publishing.
      # No NPM_TOKEN: npm exchanges the workflow's id-token for a short-lived
      # publish credential, so long as a Trusted Publisher for this repo +
      # workflow (publish.yml) is configured on npmjs.org. Provenance is
      # attested automatically under OIDC.
      - name: Publish to npm
        run: npm publish --access public

      # Publish to GitHub Packages
      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@a4xrbj1'

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create a GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/a4xrbj1/meteor-desktop/blob/master/CHANGELOG.md) for full release notes.
          generate_release_notes: true
          draft: false
          prerelease: false
